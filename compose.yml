services:
  web-main:
    image: nginx:1.28
    container_name: web-main
    ports:
      - 80:80
    volumes:
      - ./config:/etc/nginx/conf.d:ro
      - ./main:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
      - streamlit
    networks:
      - spark-network

  frontend:
    image: nginx:1.28
    container_name: frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/config:/etc/nginx/conf.d:ro
    networks:
      - spark-network

  backend:
    image: uv:3
    container_name: backend
    environment:
      - MARIADB_HOST=mysql+pymysql://root:1234@mariadb:3306/seoul_metro_spark
      - FILE_DIR=/workspace/data/seoulmetro_coordinate_2025.csv
      - HOST_IP=backend
      - SPARK_URL=spark://spark-master:7077
      - JAR_PATH=/workspace/mariadb-java-client-3.4.0.jar
      - DB_URL=jdbc:mariadb://mariadb:3306/seoul_metro_spark
      - MARIA_USER=root
      - MARIA_PASSWORD=1234
      - MARIA_HOST=mariadb
      - MARIA_DATABASE=seoul_metro_spark
      - MARIA_PORT=3306
    volumes:
      - ./backend/core:/workspace/core
      - ./backend/database:/workspace/database
      - ./backend/routers:/workspace/routers
      - ./backend/schemas:/workspace/schemas
      - ./backend/service:/workspace/service
      - ./backend/main.py:/workspace/main.py
      - ./backend/.python-version:/workspace/.python-version
      - ./backend/pyproject.toml:/workspace/pyproject.toml
      - ./backend/uv.lock:/workspace/uv.lock
      - ./backend/mariadb-java-client-3.4.0.jar:/workspace/mariadb-java-client-3.4.0.jar
    networks:
      - spark-network
    command: [ "uv", "run", "fastapi", "run", "--proxy-headers", "--forwarded-allow-ips", "'*'" ]

  streamlit:
    image: uv:1
    container_name: streamlit
    environment:
      - MARIA_USER=root
      - MARIA_PASSWORD=1234
      - MARIA_HOST=mariadb
      - MARIA_DATABASE=db_to_air
      - MARIA_PORT=3306
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
    working_dir: /workspace
    volumes:
      - ./streamlit/.python-version:/workspace/.python-version
      - ./streamlit/pyproject.toml:/workspace/pyproject.toml
      - ./streamlit/uv.lock:/workspace/uv.lock
      - ./streamlit/main.py:/workspace/main.py
      - ./streamlit/settings.py:/workspace/settings.py
      - ./streamlit/db.py:/workspace/db.py
      - ./streamlit/components:/workspace/components
      - ./streamlit/pages:/workspace/pages
      - ./streamlit/styles:/workspace/styles
    networks:
      - spark-network
    ports:
      - "8501:8501"
    command: [ "uv", "run", "--frozen", "streamlit", "run", "main.py", "--server.address", "0.0.0.0", "--server.port", "8501", "--server.enableCORS", "false", "--server.enableXsrfProtection", "false" ]
    # command: >
    #   sh -c "uv pip install --system streamlit pandas sqlalchemy pymysql mariadb && 
    #      python -m streamlit run main.py --server.address 0.0.0.0 --server.port 8501 --server.enableCORS false --server.enableXsrfProtection false"
  spark-master:
    image: apache/spark:4.1.1-java21-python3
    container_name: spark-master
    user: root
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"

    networks:
      - spark-network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker-1:
    image: apache/spark:4.1.1-java21-python3
    container_name: spark-worker-1
    user: root
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - spark-work-1:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-worker-2:
    image: apache/spark:4.1.1-java21-python3
    container_name: spark-worker-2
    user: root
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - spark-work-2:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  mariadb:
    container_name: mariadb
    image: mariadb:12.1.2
    restart: always
    ports:
      - 3306:3306
    networks:
      - spark-network
    volumes:
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro
      - data-mariadb:/var/lib/mysql:rw
    environment:
      - MARIADB_HOST=localhost
      - MARIADB_PORT=3306
      - MARIADB_ROOT_PASSWORD=1234
      - TZ=Asia/Seoul
      - LC_ALL:en_US.UTF-8

networks:
  spark-network:
    driver: bridge

volumes:
  spark-work-1:
  spark-work-2:
  data-mariadb:
    external: true
